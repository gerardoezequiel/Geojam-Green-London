green_cities:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ./build/dev.duckdb
      extensions:
        - httpfs
        - spatial
        - { name: raster, repository: community }
      settings:
        s3_region: us-west-2
        s3_url_style: path
    ci:
      type: duckdb
      path: ./build/ci.duckdb
      extensions:
        - httpfs
        - spatial
        - { name: raster, repository: community }
      settings:
        s3_region: us-west-2
        s3_access_key_id: '{{ env_var("R2_ACCESS_KEY_ID") }}'
        s3_secret_access_key: '{{ env_var("R2_SECRET_ACCESS_KEY") }}'
        s3_endpoint: '{{ env_var("R2_S3_ENDPOINT") }}'
